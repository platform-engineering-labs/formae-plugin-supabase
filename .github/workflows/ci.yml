name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly full conformance run against live Supabase. Billable —
    # provisions Project + (paid) Branch resources, then tears them down.
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      test_filter:
        description: 'Conformance test name filter (e.g. apikey). Empty = all tests.'
        required: false
        default: ''
        type: string
      formae_version:
        description: 'Formae version to test against (default: latest)'
        required: false
        default: 'latest'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0
      - name: Build
        run: make build
      - name: Unit tests
        run: make test-unit

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: golangci/golangci-lint-action@v8.0.0
        with:
          version: latest

  pkl-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0
      - name: Validate manifest
        run: pkl eval formae-plugin.pkl --format json > /dev/null

  verify-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0
      - name: Verify schema
        run: make verify-schema

  # Conformance tests run against a live Supabase project + billable
  # resources (Project create takes 2–3 min and bills the account).
  #
  # Trigger matrix:
  #   schedule          → full suite nightly (billable, low frequency)
  #   workflow_dispatch → optional `test_filter` input scopes the run
  #                       (e.g. set to `apikey` for a $0 free-tier check)
  #   push / pull_request → skipped (would bill on every merge / PR)
  #
  # Required GitHub secrets:
  #   - SUPABASE_ACCESS_TOKEN     Personal Access Token (https://supabase.com/dashboard/account/tokens)
  #   - SUPABASE_ORGANIZATION_ID  Org slug for ephemeral test projects
  #   - SUPABASE_PROJECT_REF      Pre-provisioned project for sub-resource tests
  #   - SUPABASE_DB_PASS          Postgres password used by the Project conformance fixtures
  conformance-tests:
    needs: [build, lint, pkl-validate, verify-schema]
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        formae_version: ['latest']

    env:
      SUPABASE_ACCESS_TOKEN:    ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_ORGANIZATION_ID: ${{ secrets.SUPABASE_ORGANIZATION_ID }}
      SUPABASE_PROJECT_REF:     ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASS:         ${{ secrets.SUPABASE_DB_PASS }}
      FORMAE_TEST_RUN_ID:       ${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Install plugin
        run: make install

      - name: Run conformance tests
        run: |
          VERSION="${{ inputs.formae_version }}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "latest" ]; then
            VERSION="${{ matrix.formae_version }}"
          fi
          FILTER="${{ inputs.test_filter }}"
          if [ -n "$FILTER" ]; then
            echo "Running conformance with TEST=$FILTER"
            make conformance-test VERSION="$VERSION" TEST="$FILTER"
          else
            echo "Running full conformance suite (billable)"
            make conformance-test VERSION="$VERSION"
          fi
