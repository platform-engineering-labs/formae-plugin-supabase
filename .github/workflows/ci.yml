name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly full conformance run against live Supabase. Billable —
    # provisions Project + (paid) Branch resources, then tears them down.
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      test_filter:
        description: 'Conformance test name filter (e.g. apikey). Empty = all tests in parallel.'
        required: false
        default: ''
        type: string
      formae_version:
        description: 'Formae version to test against (default: latest)'
        required: false
        default: 'latest'
        type: string

# Serialise conformance runs — they share a single Supabase project for
# sub-resource tests, so parallel pipelines clobber each other.
concurrency:
  group: supabase-conformance-tests
  cancel-in-progress: false

jobs:
  # ------------------------------------------------------------------
  # Always-on checks (build, lint, schema). Run on every push and PR.
  # ------------------------------------------------------------------

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0
      - name: Build
        run: make build
      - name: Unit tests
        run: make test-unit

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: golangci/golangci-lint-action@v8.0.0
        with:
          version: latest

  pkl-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0
      - name: Validate manifest
        run: pkl eval formae-plugin.pkl --format json > /dev/null

  verify-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0
      - name: Verify schema
        run: make verify-schema

  # ------------------------------------------------------------------
  # Live conformance tests — runs on schedule + workflow_dispatch only.
  # ------------------------------------------------------------------

  # Discover one matrix entry per `testdata/<name>.pkl` (excluding -update
  # and -replace variants). The conformance harness picks them up via
  # `TEST=<name>` and runs the create/update/replace/destroy lifecycle.
  #
  # Trigger matrix:
  #   push to main           → full suite (billable; main branch protection)
  #   schedule (nightly)     → full suite
  #   workflow_dispatch      → optional `test_filter` scopes the run
  #   pull_request (same-repo) → full suite
  #   pull_request (fork)    → skipped — GitHub strips secrets from fork PRs
  discover-tests:
    needs: [build, lint, pkl-validate, verify-schema]
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    outputs:
      test-cases: ${{ steps.discover.outputs.test-cases }}
    steps:
      - uses: actions/checkout@v4
      - name: Discover test cases
        id: discover
        run: |
          # Resources excluded from the default matrix:
          #   branch — Supabase branches require a paid project. The shared
          #     test project (`SUPABASE_PROJECT_REF`) is free tier.
          #   organization — the Management API exposes no DELETE for orgs,
          #     so the harness's OOB-delete step can never succeed.
          #
          # Singletons (*-settings, network-restriction, pooler-config) and
          # project are now in the default matrix again — managed-keys are
          # encoded in NativeID so Read no longer surfaces server-side
          # extras as drift, and Project.Update probes Status before PATCH
          # so transient post-Create states yield InProgress instead of a
          # hard Failure.
          #
          # Override with `workflow_dispatch -f test_filter=<name>` to force
          # an excluded resource into a run (e.g. against a paid project).
          EXCLUDE='branch|organization'

          FILTER="${{ inputs.test_filter }}"
          TEST_CASES=$(ls testdata/*.pkl 2>/dev/null \
            | xargs -n1 basename \
            | grep -v '\-update\.pkl$' \
            | grep -v '\-replace\.pkl$' \
            | sed 's/\.pkl$//' \
            | { if [ -n "$FILTER" ]; then grep -F "$FILTER"; else grep -Ev "^($EXCLUDE)$"; fi; } \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "Discovered test cases: ${TEST_CASES}"
          echo "test-cases=${TEST_CASES}" >> "$GITHUB_OUTPUT"

  conformance-tests:
    needs: [discover-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        test-case: ${{ fromJson(needs.discover-tests.outputs.test-cases) }}
      # Matrix entries serialize because `scripts/ci/clean-environment.sh`
      # runs before + after each test and indiscriminately deletes
      # resources matching the test prefix on the shared project.
      # Running two jobs in parallel = each job's pre-cleanup nukes the
      # other's freshly-created resources before discovery sees them.
      # Fix once the cleanup script gets per-run scoping.
      max-parallel: 1
      fail-fast: false

    env:
      SUPABASE_ACCESS_TOKEN:    ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_ORGANIZATION_ID: ${{ secrets.SUPABASE_ORGANIZATION_ID }}
      SUPABASE_PROJECT_REF:     ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASS:         ${{ secrets.SUPABASE_DB_PASS }}
      FORMAE_TEST_RUN_ID:       ${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.test-case }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Install plugin
        run: make install

      - name: Run conformance test (${{ matrix.test-case }})
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 2
          # Reset the shared project state on retry so a partial run
          # doesn't leak into the second attempt.
          on_retry_command: ./scripts/ci/clean-environment.sh || true
          command: |
            VERSION="${{ inputs.formae_version }}"
            if [ -z "$VERSION" ] || [ "$VERSION" = "latest" ]; then
              VERSION="latest"
            fi
            # CRUD on every trigger; Discovery only on schedule (nightly).
            #
            # Even with `Config.projectRef` scoping our List() to a single
            # project, the Supabase Management API has 5–10s eventual
            # consistency between POST /functions (and /secrets) and the
            # corresponding list endpoint. Our List sometimes returns an
            # empty array right after Create, then the list element
            # disappears on the next sweep — flaking the 2-minute discovery
            # window. Run those on the slower nightly cadence so noise
            # doesn't block push/PR.
            if [ "${{ github.event_name }}" = "schedule" ]; then
              make conformance-test VERSION="$VERSION" TEST=${{ matrix.test-case }} TIMEOUT=15m
            else
              make conformance-test-crud VERSION="$VERSION" TEST=${{ matrix.test-case }} TIMEOUT=15m
            fi

  # Aggregate the matrix — single green tick on the PR/branch.
  conformance-summary:
    needs: [conformance-tests]
    runs-on: ubuntu-latest
    if: always() && needs.conformance-tests.result != 'skipped'
    steps:
      - name: Report aggregate result
        run: |
          if [ "${{ needs.conformance-tests.result }}" = "success" ]; then
            echo "All conformance matrix entries passed."
          else
            echo "Conformance matrix failed: ${{ needs.conformance-tests.result }}"
            exit 1
          fi
