name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_filter:
        description: 'Conformance test name filter (e.g. apikey). Empty = all tests in parallel.'
        required: false
        default: ''
        type: string
      formae_version:
        description: 'Formae version to test against (default: latest)'
        required: false
        default: 'latest'
        type: string

# Serialise conformance runs — they share a single Supabase project for
# sub-resource tests, so parallel pipelines clobber each other.
concurrency:
  group: supabase-conformance-tests
  cancel-in-progress: false

jobs:
  # ------------------------------------------------------------------
  # Always-on checks (build, lint, schema). Run on every push and PR.
  # ------------------------------------------------------------------

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0
      - name: Build
        run: make build
      - name: Unit tests
        run: make test-unit

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: golangci/golangci-lint-action@v9.3.0
        with:
          version: latest

  pkl-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0
      - name: Validate manifest
        run: pkl eval formae-plugin.pkl --format json > /dev/null

  verify-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0
      - name: Verify schema
        run: make verify-schema

  # ------------------------------------------------------------------
  # Live conformance tests — run on every same-repo PR, push to main, and
  # manual dispatch. The nightly schedule lives in nightly.yml (tests against
  # formae main). Fork PRs are skipped because GitHub strips secrets from them.
  # ------------------------------------------------------------------

  # Discover one matrix entry per `testdata/<name>.pkl` (excluding -update
  # and -replace variants). The conformance harness picks them up via
  # `TEST=<name>` and runs the create/update/replace/destroy lifecycle.
  #
  # Trigger matrix:
  #   push to main           → full suite (billable; main branch protection)
  #   workflow_dispatch      → optional `test_filter` scopes the run
  #   pull_request (same-repo) → full suite
  #   pull_request (fork)    → skipped — GitHub strips secrets from fork PRs
  discover-tests:
    needs: [build, lint, pkl-validate, verify-schema]
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    outputs:
      test-cases: ${{ steps.discover.outputs.test-cases }}
    steps:
      - uses: actions/checkout@v4
      - name: Discover test cases
        id: discover
        run: |
          # Every resource in testdata/ runs in CI as a hard gate, against the
          # shared persistent project (github-ci-fixed, via SUPABASE_PROJECT_REF).
          # Note: `project` has no -replace fixture (the Replace phase needs a
          # second project to coexist with the persistent one, exceeding the
          # free-tier 2-project cap), so project runs every phase but Replace.
          FILTER="${{ inputs.test_filter }}"
          TEST_CASES=$(ls testdata/*.pkl 2>/dev/null \
            | xargs -n1 basename \
            | grep -v '\-update\.pkl$' \
            | grep -v '\-replace\.pkl$' \
            | sed 's/\.pkl$//' \
            | { if [ -n "$FILTER" ]; then grep -F "$FILTER"; else cat; fi; } \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "Discovered test cases: ${TEST_CASES}"
          echo "test-cases=${TEST_CASES}" >> "$GITHUB_OUTPUT"

  conformance-tests:
    needs: [discover-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        test-case: ${{ fromJson(needs.discover-tests.outputs.test-cases) }}
      # Matrix entries serialize because `scripts/ci/clean-environment.sh`
      # runs before + after each test and indiscriminately deletes
      # resources matching the test prefix on the shared project.
      # Running two jobs in parallel = each job's pre-cleanup nukes the
      # other's freshly-created resources before discovery sees them.
      # Fix once the cleanup script gets per-run scoping.
      max-parallel: 1
      fail-fast: false

    env:
      SUPABASE_ACCESS_TOKEN:    ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_ORGANIZATION_ID: ${{ secrets.SUPABASE_ORGANIZATION_ID }}
      SUPABASE_PROJECT_REF:     ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASS:         ${{ secrets.SUPABASE_DB_PASS }}
      FORMAE_TEST_RUN_ID:       ${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.test-case }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Install plugin
        run: make install

      - name: Run conformance test (${{ matrix.test-case }})
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 2
          # Reset the shared project state on retry so a partial run
          # doesn't leak into the second attempt.
          on_retry_command: ./scripts/ci/clean-environment.sh || true
          command: |
            VERSION="${{ inputs.formae_version }}"
            if [ -z "$VERSION" ] || [ "$VERSION" = "latest" ]; then
              VERSION="latest"
            fi
            # CRUD + Discovery on every trigger. Discovery is a hard gate now
            # that every resource type is discoverable (write-only fields made
            # nullable so they don't fail Required validation; Branch.Read
            # sources name/parent from the project branch list).
            #
            # Note: the Supabase Management API has 5–10s eventual consistency
            # between POST /functions (and /secrets) and the corresponding list
            # endpoint, so List can briefly return an empty array right after
            # Create. The conformance harness polls within FORMAE_TEST_TIMEOUT
            # (OP_TIMEOUT=20m) and the job retries once (retry@v3, max 2) with a
            # clean-environment reset, which absorbs that window.
            make conformance-test VERSION="$VERSION" TEST=${{ matrix.test-case }} TIMEOUT=25m OP_TIMEOUT=20

  # Aggregate the matrix — single green tick on the PR/branch.
  conformance-summary:
    needs: [conformance-tests]
    runs-on: ubuntu-latest
    if: always() && needs.conformance-tests.result != 'skipped'
    steps:
      - name: Report aggregate result
        run: |
          if [ "${{ needs.conformance-tests.result }}" = "success" ]; then
            echo "All conformance matrix entries passed."
          else
            echo "Conformance matrix failed: ${{ needs.conformance-tests.result }}"
            exit 1
          fi
